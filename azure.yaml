name: modernize-your-code-solution-accelerator
# metadata:
#     template: modernize-your-code-solution-accelerator@1.0

requiredVersions:
  azd: '>= 1.18.0 != 1.23.9'

parameters:
  AzureAiServiceLocation:
    type: string
    default: japaneast
  Prefix:
    type: string
    default: azdtemp
  baseUrl:
    type: string
    default: 'https://raw.githubusercontent.com/microsoft/Modernize-your-code-solution-accelerator'
deployment:
  mode: Incremental
  template: ./infra/main.bicep  # Path to the main.bicep file inside the 'deployment' folder
  parameters:
    AzureAiServiceLocation: ${{ parameters.AzureAiServiceLocation }}
    Prefix: ${{ parameters.Prefix }}
    baseUrl: ${{ parameters.baseUrl }}

# After provisioning, build the backend/frontend images remotely in the newly
# provisioned Azure Container Registry and update the container apps to use them.
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/build_and_push_images.ps1
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: ./scripts/build_and_push_images.sh
      continueOnError: false
      interactive: true
